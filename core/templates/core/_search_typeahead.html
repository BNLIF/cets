{% if groups %}
<div class="search-dropdown" role="listbox">
    {% for g in groups %}
    <div class="search-group">
        <div class="search-group-head">{{ g.family }}</div>
        {% for it in g.items %}
        <a class="search-result" href="{{ it.url }}">
            <span class="cell-mono" style="color: var(--accent); font-weight: 500;">{{ it.serial }}</span>
            <span class="search-result-kind">{{ g.family }}</span>
        </a>
        {% endfor %}
    </div>
    {% endfor %}
</div>
{% elif q %}
<div class="search-dropdown">
    <div style="padding: 16px 12px; color: var(--text-4); font-family: var(--font-mono); font-size: 12px; text-align: center;">No matches for "{{ q }}"</div>
</div>
{% endif %}
