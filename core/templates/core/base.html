{% load static %}
<!DOCTYPE html>
<html lang="en" data-density="spacious">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CETS — Cold Electronics Tracking System{% endblock %}</title>
    <link rel="icon" href="{% static 'core/images/favicon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="{% static 'core/css/cets.css' %}" rel="stylesheet">
</head>
<body>
    <header class="topnav">
        <a class="brand" href="{% url 'home' %}">
            <span class="brand-mark">C</span>
            CETS
        </a>
        <nav class="nav-tabs">
            <a class="nav-tab" href="{% url 'home' %}" {% if page == 'home' %}aria-current="page"{% endif %}>
                <span class="nav-tab-dot"></span>Dashboard
            </a>
            <a class="nav-tab" href="{% url 'larasic' %}" {% if page == 'larasic' %}aria-current="page"{% endif %}>
                <span class="nav-tab-dot"></span>LArASIC
            </a>
            <a class="nav-tab" href="{% url 'coldadc' %}" {% if page == 'coldadc' %}aria-current="page"{% endif %}>
                <span class="nav-tab-dot"></span>ColdADC
            </a>
            <a class="nav-tab" href="{% url 'coldata' %}" {% if page == 'coldata' %}aria-current="page"{% endif %}>
                <span class="nav-tab-dot"></span>COLDATA
            </a>
            <a class="nav-tab" href="{% url 'femb' %}" {% if page == 'femb' %}aria-current="page"{% endif %}>
                <span class="nav-tab-dot"></span>FEMB
            </a>
            <a class="nav-tab" href="{% url 'cable' %}" {% if page == 'cable' %}aria-current="page"{% endif %}>
                <span class="nav-tab-dot"></span>Cable
            </a>
        </nav>
        <div class="topnav-right">
            <div class="search-wrap">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
                <input
                    class="search-input"
                    type="search"
                    name="q"
                    placeholder="Search serials…"
                    autocomplete="off"
                    hx-get="{% url 'search_typeahead' %}"
                    hx-trigger="keyup changed delay:200ms, search"
                    hx-target="#search-results"
                    hx-swap="innerHTML"
                >
                <div id="search-results" class="search-results"></div>
            </div>
            <button class="btn btn-ghost" type="button" title="Notifications" style="width: 32px; padding: 0; justify-content: center;" disabled>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9M10 21a2 2 0 0 0 4 0"/></svg>
            </button>
        </div>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <script src="https://unpkg.com/htmx.org@1.9.5"></script>
</body>
</html>
