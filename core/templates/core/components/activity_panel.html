<div class="panel">
    <div class="panel-head">
        <div class="panel-title">Recent activity</div>
    </div>
    <div class="timeline">
        {% for a in items %}
        <a class="tl-item" href="{{ a.target_url }}" style="text-decoration: none; color: inherit;">
            <div class="tl-icon {{ a.kind }}">
                {% if a.kind == 'pass' %}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
                {% elif a.kind == 'fail' %}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                {% elif a.kind == 'test' %}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4a2 2 0 0 0-4 0v10.5a4 4 0 1 0 4 0V4Z"/></svg>
                {% else %}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>{% endif %}
            </div>
            <div class="tl-body">
                <span class="tl-verb">{{ a.verb }}</span> <span class="tl-target">{{ a.target_label }}</span>
                {% if not compact and a.note %}<div class="tl-note">{{ a.note }}</div>{% endif %}
            </div>
            <div class="tl-time">{{ a.relative }}</div>
        </a>
        {% empty %}
        <div style="padding: 28px 0; text-align: center; color: var(--text-4); font-size: 12px; font-family: var(--font-mono);">No recent activity.</div>
        {% endfor %}
    </div>
</div>
