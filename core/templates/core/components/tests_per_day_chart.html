<svg viewBox="0 0 {{ w }} {{ h|add:30 }}" style="width: 100%; height: auto; display: block;" preserveAspectRatio="none">
    {% for g in grid %}
    <g>
        <line x1="0" x2="{{ w }}" y1="{{ g.y }}" y2="{{ g.y }}" stroke="var(--border)" stroke-dasharray="2 4" />
        <text x="{{ w|add:-4 }}" y="{{ g.y|add:-4 }}" font-size="9" fill="var(--text-4)" text-anchor="end" font-family="var(--font-mono)">{{ g.label }}</text>
    </g>
    {% endfor %}
    {% for b in bars %}
    <rect x="{{ b.x }}" y="{{ b.y }}" width="{{ b.w }}" height="{{ b.h }}" fill="{% if b.recent %}var(--accent){% else %}color-mix(in oklch, var(--accent) 35%, white){% endif %}" rx="1.5">
        <title>{{ b.date|date:"Y-m-d" }}: {{ b.count }} tested</title>
    </rect>
    {% endfor %}
    <g font-family="var(--font-mono)" font-size="9" fill="var(--text-4)">
        <text x="0" y="{{ h|add:14 }}">{{ first_label }}</text>
        <text x="{{ w|add:-360 }}" y="{{ h|add:14 }}">{{ mid_label }}</text>
        <text x="{{ w|add:-50 }}" y="{{ h|add:14 }}">{{ last_label }}</text>
    </g>
</svg>
<div style="display: flex; justify-content: space-between; align-items: baseline; margin-top: 14px;">
    <div>
        <span style="color: var(--text-4); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--font-mono);">Total tested · {{ bars|length }}d</span>
        <div style="color: var(--text); font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-top: 4px;">{{ total }} <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-3); font-weight: 400;">tests</span></div>
    </div>
    <div style="text-align: right;">
        <span style="color: var(--text-4); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--font-mono);">Daily average</span>
        <div style="color: var(--text-2); font-family: var(--font-mono); font-size: 13px; margin-top: 4px;">{{ daily_avg }} / day</div>
    </div>
</div>
