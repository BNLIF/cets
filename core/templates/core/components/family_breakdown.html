<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
    {% for f in families %}
    <a class="link-card" href="{{ f.href|default:'#' }}" style="text-align: left; display: block;">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <div>
                <div style="font-family: var(--font-mono); font-size: 12px; font-weight: 600;">{{ f.name }}</div>
                <div style="font-size: 11px; color: var(--text-4); margin-top: 2px;">{{ f.kind }}</div>
            </div>
            <div style="font-family: var(--font-mono); font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums;">{{ f.total }}</div>
        </div>
        <div style="margin-top: 10px; height: 4px; background: var(--bg-muted); border-radius: 2px; overflow: hidden;">
            <div style="width: {{ f.pct }}%; height: 100%; background: var(--accent);"></div>
        </div>
        <div style="margin-top: 6px; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--text-3);">
            <span>{{ f.tested }} tested</span>
            <span>{{ f.pending }} pending</span>
        </div>
    </a>
    {% endfor %}
</div>
