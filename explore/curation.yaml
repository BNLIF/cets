# Curated DUNE hardware taxonomy for the explorer (ADR-0012).
#
# Source of truth for what is browsable, per HWDB instance (#47): prod backs
# /hw/, dev backs /hw/dev/. Under each instance: Region → Family → member HWDB
# system ids. Only systems listed under a browsable family are walked by the
# refresh and shown in the tree. Families/regions with `curated: false` are
# declared placeholders — they render dimmed ("not curated") so the
# audit→curate loop has somewhere to land, but aren't browsable and pull no
# data. System ids (and part-type ids) are per-instance — never copy them
# across instance blocks.
#
# Run `python manage.py list_systems [--instance dev]` to audit a block
# against live HWDB and see what's newly available to curate (issue #39).
# System ids are the `id` field of `systems/D`.

# `key` is the stable URL slug for each region/family (used in deep links like
# /explore/FD/FD-VD/57/2/D05700200001). Keep keys stable across edits.
instances:
  prod:
    # Extra HWDB projects (PID part1 letters) mirrored besides "D" (#71).
    # Each renders at the same tree level as DUNE; the refresh records its
    # systems (names only) and each system walks lazily on first visit, like
    # Uncurated. System ids are per-project — a Z system 5 is not D's system 5.
    # Names audited from `GET projects` 2026-07-24 (they differ per instance).
    # Prod's Z is upstream-named "Test Project" but displayed as Sandbox to
    # match dev — Hajime expects real entries there in the future (2026-07-24).
    extra_projects:
      - {id: L, name: LBNF}
      - {id: Z, name: Sandbox, test: true}   # excluded from overview stats

    regions:
      - name: Far Detector
        key: FD
        families:
          - name: FD-VD
            key: FD-VD
            sub: Vertical Drift
            systems: [51, 54, 55, 56, 57, 58, 59, 80]
          - name: FD CE
            key: FD-CE
            sub: Cold Electronics            # single system → flattened in the tree
            systems: [81]
          - name: FD-HD
            key: FD-HD
            sub: Horizontal Drift
            systems: [1, 3, 4, 5, 8, 9]
          - name: FD Common
            key: FD-shared            # key stays stable so deep links don't break
            sub: DAQ · Slow Control · Cryostat · Integration · Installation
            systems: [82, 83, 85, 86, 600]
          - name: FS
            key: FS
            sub: Far Site · Safety · BSI · Cryogenics · Networking
            systems: [200, 201, 300, 400]

      # ND + Others curated from the 2026-07-02 prod audit (41 systems),
      # mirroring the FD family style: detectors / common / site services.
      - name: Near Detector
        key: ND
        families:
          - name: ND Detectors
            key: ND-DET
            sub: LAr ND · TMS · SAND · PRISM
            systems: [100, 101, 102, 103, 106]
          - name: ND Common
            key: ND-shared
            sub: DAQ · Slow Control · Cryostat · Integration · Installation
            systems: [104, 105, 107, 108, 621]
          - name: NS
            key: NS
            sub: Near Site · Safety · BSI · Cryogenics · Networking
            systems: [220, 221, 321, 421]

      - name: Others
        key: OT                       # key stays stable so deep links don't break
        families:
          - name: Computing
            key: COMP                 # single system → flattened in the tree
            systems: [500]
          - name: Prototypes
            key: PROTO
            sub: ProtoDUNE-II · FD2-VD Module-0
            systems: [900, 901]

    # Component-type leaves whose items are physical shipping boxes (ADR-0013).
    # Such a leaf gets the Shipments panes on top of the regular component view.
    # Entries are part-type ids, or a quoted "system.subsystem" selector (e.g.
    # "86.990") marking every type under that subsystem as shipping boxes.
    # Discover candidates with `python manage.py list_shippable` (issue #46).
    # 2026-07-02 audit: every 'shipping'-named subsystem holds only
    # box/container types, so all five are whole-subsystem selectors.
    shipping_types:
      - "55.51"        # FD-VD Top CRP › Shipping (Box, Container)
      - "56.51"        # FD-VD Bottom CRP › Shipping (Box)
      - "57.6"         # FD-VD TDE › Shipping (Electronics box, FEB container, crates, …)
      - "81.202"       # FD CE › CE Shipping Box
      - "86.990"       # FD Installation › Shipping Box/Container (Ash River tooling)

  dev:
    # Audited via `list_systems --instance dev` 2026-07-02 (47 systems): dev
    # mirrors prod's taxonomy with FD1-HD/FD2-VD naming. Curated like prod —
    # FD / ND / Others. System 5 (FD1-HD HVS) hosts the sandbox subsystems
    # 997 "QAQCTest" and 998 "HWDBUnitTest" — Hajime's test entries, incl.
    # D00599800007 "Test Type 007" (his ship/receive demos) and the
    # upstream-broken D00599800023 "TestType023-Boxes" (the dev API 500s on
    # it). Dev-only strays (21 "DAQ", 60 deprecated HVS, 84 "FD CI") stay
    # uncurated → the Uncurated overflow section.

    # Uncurated systems render in an automatic "Uncurated" section (#49):
    # the hierarchy refresh records every non-curated system (names only, no
    # walk), and each is walked lazily on first visit. Dev-only affordance —
    # prod keeps its deliberate dimmed placeholders.
    overflow: true

    # Extra projects (#71) — Hajime tests Z/L entries on dev; prod mirrors
    # only LBNF. List order is display order: LBNF above the sandbox.
    extra_projects:
      - {id: L, name: LBNF}
      - {id: Z, name: Sandbox, test: true}   # excluded from overview stats

    regions:
      - name: Far Detector
        key: FD
        families:
          - name: FD-VD
            key: FD-VD
            sub: Vertical Drift (FD2-VD)
            systems: [51, 52, 53, 54, 55, 56, 57, 58, 59, 80]   # 60 (deprecated HVS) → Uncurated
          - name: FD CE
            key: FD-CE
            sub: Cold Electronics            # single system → flattened in the tree
            systems: [81]
          - name: FD-HD
            key: FD-HD
            sub: Horizontal Drift (FD1-HD) · system 5 holds the HWDBUnitTest sandbox
            systems: [1, 2, 3, 4, 5, 6, 8]
          - name: FD Common
            key: FD-shared
            sub: DAQ · Slow Control · Cryostat · Integration · Installation
            systems: [82, 83, 85, 86, 600]
          - name: FS
            key: FS
            sub: Far Site · Safety · BSI · Cryogenics · Networking
            systems: [200, 201, 300, 400]

      # Same ND/NS/Others ids as prod (verified in the 2026-07-02 dev audit).
      - name: Near Detector
        key: ND
        families:
          - name: ND Detectors
            key: ND-DET
            sub: LAr ND · TMS · SAND · PRISM
            systems: [100, 101, 102, 103, 106]
          - name: ND Common
            key: ND-shared
            sub: DAQ · Slow Control · Cryostat · Integration · Installation
            systems: [104, 105, 107, 108, 621]
          - name: NS
            key: NS
            sub: Near Site · Safety · BSI · Cryogenics · Networking
            systems: [220, 221, 321, 421]

      - name: Others
        key: OT                       # key stays stable so deep links don't break
        families:
          - name: Computing
            key: COMP                 # single system → flattened in the tree
            systems: [500]
          - name: Prototypes
            key: PROTO
            sub: ProtoDUNE-II · FD2-VD Module-0
            systems: [900, 901]

    # Hajime's ship/receive demos live on "Test Type 007" (#48): boxes like
    # D00599800007-00133 carry pre-shipping checklists + labels. The literal
    # box type D00599800023 ("TestType023-Boxes") stays out until the dev API
    # can serialize it (500s on its own category "box" rows — see #47).
    # A quoted "system.subsystem" entry marks the WHOLE subsystem as shipping
    # boxes (every component type under it, present and future). Quote it —
    # unquoted YAML reads 86.990 as the float 86.99. 2026-07-02 audit: same
    # five all-boxes subsystems as prod, with dev's own CRP subsystem ids.
    shipping_types:
      - D00599800007   # HWDBUnitTest › "Test Type 007" (ship/receive workflow)
      - "55.50"        # FD2-VD Top CRP › Shipping box (Shipping box, Container)
      - "56.50"        # FD2-VD Bottom CRP › Shipping box
      - "57.6"         # FD2-VD TDE › Shipping Containers (Electronics Box, FEB, …)
      - "81.202"       # FD1-HD/FD2-VD Elec. › CE Shipping Box
      - "86.990"       # FD2-VD FD Installation › Shipping Box/Container (all types)
