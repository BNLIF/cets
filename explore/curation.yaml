# Curated DUNE hardware taxonomy for the explorer (ADR-0012).
#
# Source of truth for what is browsable: Region → Family → member HWDB system
# ids. Only systems listed under a browsable family are walked by the refresh
# and shown in the tree. Families/regions with `curated: false` are declared
# placeholders — they render dimmed ("not curated") so the audit→curate loop
# has somewhere to land, but aren't browsable and pull no data.
#
# Run `python manage.py list_systems` to audit this against live HWDB and see
# what's newly available to curate (issue #39). System ids are the `id` field
# of `systems/D`.

# `key` is the stable URL slug for each region/family (used in deep links like
# /explore/FD/FD-VD/57/2/D05700200001). Keep keys stable across edits.
regions:
  - name: Far Detector
    key: FD
    families:
      - name: FD-VD
        key: FD-VD
        sub: Vertical Drift
        systems: [51, 54, 55, 56, 57, 58, 59, 80]
      - name: FD CE
        key: FD-CE
        sub: Cold Electronics            # single system → flattened in the tree
        systems: [81]
      - name: FD-HD
        key: FD-HD
        sub: Horizontal Drift
        curated: false
        note: "6 systems in HWDB · not curated"
      - name: FD shared
        key: FD-shared
        sub: DAQ · Slow Control · Cryostat · Integration
        curated: false
        note: "5 systems in HWDB · not curated"

  - name: Near Detector
    key: ND
    curated: false
    note: "9 systems in HWDB · not curated"

  - name: Other
    key: OT
    curated: false
    note: "Facilities · Computing · Prototypes · not curated"

# Component-type leaves whose items are physical shipping boxes (ADR-0013).
# Such a leaf shows a Shipments panel (location tracking) instead of test plots.
# Discover candidates with `python manage.py list_shippable` (issue #46).
shipping_types:
  - D08120200001   # FD CE › CE Shipping Box › "CE Shipping box"
