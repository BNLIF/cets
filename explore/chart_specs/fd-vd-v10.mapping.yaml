# Hand-curated mapping: chart node id -> HWDB part type id(s), per instance
# (#58). NOT generated — extractor re-runs never touch this file. Mostly one
# type per box; a list only where the chart itself says so (the "7 types" /
# "22 types" / "2 types" notes) or where chip batches share one box. FD-VD
# only — FD1-HD variants of shared systems (CE, PDS) are deliberately absent.
# Grow this as consortia register types; the audit command (#59) reports
# unmapped chart nodes and candidate matches.
#
# Node ids are the stable slugs from fd-vd-v10.yaml (NOT labels — labels
# duplicate: the two "Adapter board (12)" boxes are different types).
# Orientation: the BDE/CE subtree (inst-crp-2, cru-2, *-2 boards) reads the
# BOTTOM CRPs (system 56); the TDE-side Inst. CRP subtree reads the TOP
# CRPs (system 55).

