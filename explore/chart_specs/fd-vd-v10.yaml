# Open questions for the consortium chart owners:
# - 22-m-rms-fiber: endpoints not identifiable in the chart; left as a root.
# - camera / light (split from v4's camera-light): no parent arrows visible;
#   left as roots.
# - inst-crp-2 -> inter-frame: the box stacking says Inter. Frame is the
#   parent, but the arrowhead in the pptx points the other way (arrowheads
#   are inconsistent elsewhere in the chart too, e.g. Drawer's boards).
# - fiber-mega-bundle -> fiber-bundle direction guessed from the PDF arrow,
#   which looks inverted relative to the "child -> parent" convention.
# - "2 types" over camera/light warm cables, "4 types" over bias SHV warm
#   cable (3), and "3 types" over LM cold cable sit too far from their boxes
#   for the extractor to attach; they render as loose layout annotations
#   instead of node notes.
