# Hierarchy chart spec (#55/#56) — one YAML per chart, file name = chart id.
# Rendered at /hw/hierarchy/ by explore/charts.py, which computes the layout
# (parent box above an indented stack of children; root subtrees in band
# rows) — the spec is purely SEMANTIC, no coordinates.
#
# Bootstrapped from the v4 spec (HWDB_FD-VD_hierarchy.pptx.pdf page 2) and
# hand-updated to the v10 chart (HWDB_FD-VD_hierarchy_v10.pptx slide 2) by
# diffing extract_chart drafts of both slides and checking every ambiguous
# change against the slide XML (glued connectors, note row alignment).
# Maintain by HAND-EDITING this file when the chart changes.
#
#   nodes   id (stable slug), label, fill; optional band (roots only),
#           stroke (executive-summary border), dashed (connector positions),
#           text (label color), note (annotation right of the box)
#   edges   from -> to = child -> parent (bracket connectors); kind: cable
#           draws an orthogonal arrow instead (red unless color says else).
#           Cables are tree-parented to their equipment side; the far
#           endpoint (usually a flange) is the cable edge.
#
# The box-label -> part_type_id mapping lives in a separate overlay (#58).

chart:
  title: FD-VD Complete detector (v10)
  source: HWDB_FD-VD_hierarchy_v10.pptx, slide 2
  source_url: https://edms.cern.ch/document/3416341  # EDMS home of the live chart (Google Slides)

