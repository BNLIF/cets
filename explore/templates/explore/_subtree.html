{# One subsystem node + its component-type leaves. Expects `sub` and `selected_node`. #}
<details class="tree-sub">
    <summary>{{ sub.name }}<span class="tree-count sys-count {% if sub.n_tests %}has-data{% endif %}" title="{{ sub.n_components }} components{% if sub.n_tests %} · {{ sub.n_tests }} tests{% endif %}">&#9679;{{ sub.n_components }}</span></summary>
    <ul class="tree-leaves">
        {% for leaf in sub.leaves %}
        <li class="tree-leaf">
            <a href="?node={{ leaf.part_type_id }}" class="{% if selected_node and leaf.part_type_id == selected_node.part_type_id %}is-selected{% endif %}">
                <span>{{ leaf.name }}</span>
                <span class="tree-count {% if leaf.n_tests %}has-data{% endif %}" title="{{ leaf.n_components }} components{% if leaf.tests_synced_at %} · {{ leaf.n_tests }} tests{% else %} · tests not synced{% endif %}">&#9679;{{ leaf.n_components }}</span>
            </a>
        </li>
        {% endfor %}
    </ul>
</details>
